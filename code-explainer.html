<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decode — Code Explainer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --text-dim: #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(106,255,212,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 70% 20%, rgba(255,106,158,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* Header */
  header {
    padding: 40px 0 48px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 0 30px rgba(124,106,255,0.3);
  }

  .header-text h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    background: linear-gradient(90deg, var(--text) 0%, var(--text-muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-text p {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 3px;
  }

  .header-badge {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    border: 1px solid rgba(106,255,212,0.2);
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(106,255,212,0.05);
    letter-spacing: 0.5px;
  }

  /* Input Section */
  .input-section {
    margin-bottom: 24px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-label span {
    width: 20px;
    height: 1px;
    background: var(--border);
  }

  .code-input-wrapper {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    transition: border-color 0.3s;
    overflow: hidden;
  }

  .code-input-wrapper:focus-within {
    border-color: rgba(124,106,255,0.4);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.06);
  }

  .code-input-toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .toolbar-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .toolbar-dot:nth-child(1) { background: #ff5f57; }
  .toolbar-dot:nth-child(2) { background: #febc2e; }
  .toolbar-dot:nth-child(3) { background: #28c840; }

  .toolbar-label {
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  textarea {
    width: 100%;
    height: 260px;
    padding: 20px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text);
    caret-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  /* Button */
  .explain-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, #9d55ff 100%);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    box-shadow: 0 4px 24px rgba(124,106,255,0.3);
  }

  .explain-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .explain-btn:hover:not(:disabled)::before { opacity: 1; }
  .explain-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(124,106,255,0.4);
  }
  .explain-btn:active:not(:disabled) { transform: translateY(0); }

  .explain-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-icon {
    font-size: 18px;
    transition: transform 0.3s;
  }

  .explain-btn:hover:not(:disabled) .btn-icon {
    transform: rotate(15deg);
  }

  /* Loading */
  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 1.5s linear infinite;
    border-radius: 2px;
    margin-bottom: 24px;
    display: none;
  }

  .loading-bar.active { display: block; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Output */
  .output-section {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .output-section.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-grid {
    display: grid;
    gap: 16px;
  }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
    animation: fadeUp 0.5s ease both;
  }

  .output-card:hover {
    border-color: rgba(124,106,255,0.25);
  }

  .output-card:nth-child(1) { animation-delay: 0.05s; }
  .output-card:nth-child(2) { animation-delay: 0.1s; }
  .output-card:nth-child(3) { animation-delay: 0.15s; }
  .output-card:nth-child(4) { animation-delay: 0.2s; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .card-icon {
    font-size: 16px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  .card-icon.summary { background: rgba(124,106,255,0.15); }
  .card-icon.steps { background: rgba(255,106,158,0.15); }
  .card-icon.functions { background: rgba(106,255,212,0.15); }
  .card-icon.usage { background: rgba(255,200,100,0.15); }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .card-body {
    padding: 20px;
    font-size: 14.5px;
    line-height: 1.8;
    color: #c8c8e0;
  }

  .card-body p { margin-bottom: 10px; }
  .card-body p:last-child { margin-bottom: 0; }

  .step-item {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .step-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .step-num {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,106,158,0.15);
    border: 1px solid rgba(255,106,158,0.25);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .step-text { flex: 1; }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: rgba(124,106,255,0.12);
    color: #a895ff;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .func-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .func-block:last-child { margin-bottom: 0; }

  .func-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent3);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .func-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
  }

  .func-row {
    display: flex;
    gap: 8px;
  }

  .func-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    min-width: 60px;
    padding-top: 1px;
  }

  .func-val { color: #c8c8e0; }

  .usage-pill {
    display: inline-block;
    background: rgba(255,200,100,0.1);
    border: 1px solid rgba(255,200,100,0.2);
    color: #ffd06a;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin: 0 4px 8px 0;
  }

  /* Error */
  .error-msg {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    color: #ff8080;
    font-size: 14px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-mark">&lt;/&gt;</div>
    <div class="header-text">
      <h1>Decode</h1>
      <p>Plain-English code explanations, instantly</p>
    </div>
    <div class="header-badge">AI Powered</div>
  </header>

  <div class="input-section">
    <div class="section-label"><span></span> Paste your code <span></span></div>
    <div class="code-input-wrapper">
      <div class="code-input-toolbar">
        <div class="toolbar-dot"></div>
        <div class="toolbar-dot"></div>
        <div class="toolbar-dot"></div>
        <span class="toolbar-label">any language · any complexity</span>
      </div>
      <textarea id="codeInput" placeholder="// Paste any code here — JavaScript, Python, HTML, SQL...&#10;// Or write a snippet you want to understand better.&#10;&#10;function mystery(arr) {&#10;  return arr.reduce((a, b) => a + b, 0) / arr.length;&#10;}"></textarea>
    </div>
  </div>

  <button class="explain-btn" id="explainBtn" onclick="explainCode()">
    <div class="btn-inner">
      <span class="btn-icon">✦</span>
      <span>Explain This Code</span>
    </div>
  </button>

  <div class="loading-bar" id="loadingBar"></div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="output-section" id="outputSection">
    <div class="section-label" style="margin-bottom: 16px;"><span></span> Explanation <span></span></div>
    <div class="output-grid" id="outputGrid"></div>
  </div>

  <footer>Decode · Powered by Claude AI · No code is stored or saved</footer>
</div>

<script>
async function explainCode() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) {
    showError('Please paste some code first.');
    return;
  }

  const btn = document.getElementById('explainBtn');
  const loadingBar = document.getElementById('loadingBar');
  const outputSection = document.getElementById('outputSection');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = 'Analyzing...';
  loadingBar.classList.add('active');
  outputSection.classList.remove('visible');
  errorMsg.classList.remove('visible');

  const systemPrompt = `You are a senior developer who explains code simply for complete beginners. 
Analyze the provided code and respond with ONLY a valid JSON object (no markdown, no backticks, no extra text) in this exact structure:

{
  "summary": "1-3 sentences describing what the code does overall in plain English.",
  "steps": [
    {"num": 1, "text": "plain English explanation of this part"},
    {"num": 2, "text": "..."}
  ],
  "functions": [
    {
      "name": "functionName",
      "what": "what this function does",
      "inputs": "description of parameters, or 'No parameters' if none",
      "output": "what it returns, or 'Nothing' if void"
    }
  ],
  "usages": ["Real-world use case 1", "Real-world use case 2"],
  "usageContext": "A sentence or two about where this type of code appears in real applications."
}

If there are no functions, set "functions" to an empty array [].
Keep all explanations beginner-friendly — no jargon, plain language only.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Explain this code:\n\n${code}` }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '';

    let parsed;
    try {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(cleaned);
    } catch {
      showError('The AI returned an unexpected response. Please try again.');
      return;
    }

    renderOutput(parsed);

  } catch (err) {
    showError('Something went wrong connecting to the AI. Please try again.');
  } finally {
    btn.disabled = false;
    btn.querySelector('span:last-child').textContent = 'Explain This Code';
    loadingBar.classList.remove('active');
  }
}

function renderOutput(data) {
  const grid = document.getElementById('outputGrid');
  grid.innerHTML = '';

  // Summary card
  const summaryCard = createCard('🧾', 'summary', 'Simple Summary', `<p>${escHtml(data.summary)}</p>`);
  grid.appendChild(summaryCard);

  // Steps card
  if (data.steps && data.steps.length > 0) {
    const stepsHtml = data.steps.map(s => `
      <div class="step-item">
        <div class="step-num">${s.num}</div>
        <div class="step-text">${escHtml(s.text)}</div>
      </div>`).join('');
    grid.appendChild(createCard('🧩', 'steps', 'Step-by-Step Breakdown', stepsHtml));
  }

  // Functions card
  if (data.functions && data.functions.length > 0) {
    const funcsHtml = data.functions.map(f => `
      <div class="func-block">
        <div class="func-name">${escHtml(f.name)}()</div>
        <div class="func-meta">
          <div class="func-row"><span class="func-label">Does</span><span class="func-val">${escHtml(f.what)}</span></div>
          <div class="func-row"><span class="func-label">Takes</span><span class="func-val">${escHtml(f.inputs)}</span></div>
          <div class="func-row"><span class="func-label">Returns</span><span class="func-val">${escHtml(f.output)}</span></div>
        </div>
      </div>`).join('');
    grid.appendChild(createCard('⚙️', 'functions', 'Function Breakdown', funcsHtml));
  }

  // Usage card
  if (data.usages || data.usageContext) {
    let usageHtml = '';
    if (data.usages && data.usages.length > 0) {
      usageHtml += data.usages.map(u => `<span class="usage-pill">${escHtml(u)}</span>`).join('');
      usageHtml += '<br>';
    }
    if (data.usageContext) {
      usageHtml += `<p style="margin-top: 8px;">${escHtml(data.usageContext)}</p>`;
    }
    grid.appendChild(createCard('💡', 'usage', 'Real-World Usage', usageHtml));
  }

  document.getElementById('outputSection').classList.add('visible');
}

function createCard(icon, type, title, bodyHtml) {
  const card = document.createElement('div');
  card.className = 'output-card';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-icon ${type}">${icon}</div>
      <div class="card-title">${title}</div>
    </div>
    <div class="card-body">${bodyHtml}</div>`;
  return card;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('loadingBar').classList.remove('active');
  document.getElementById('explainBtn').disabled = false;
  document.getElementById('explainBtn').querySelector('span:last-child').textContent = 'Explain This Code';
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow Cmd/Ctrl+Enter to submit
document.getElementById('codeInput').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') explainCode();
});
</script>
</body>
</html>
